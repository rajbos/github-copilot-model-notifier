name: Check GitHub Copilot Models

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 08:00 UTC
  workflow_dispatch:      # Allow manual runs
  push:
    paths: .github/workflows/check-models.yml

permissions:
  contents: write  # Needed to commit data + pages updates and create releases

jobs:
  check-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check for model changes
        id: check
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          python scripts/check_models.py

      - name: Commit updated data and pages
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git commit -m "chore: update model data and pages [skip ci]"
          git push

      - name: Create GitHub release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.check.outputs.tag }}" \
            --title "${{ steps.check.outputs.title }}" \
            --notes-file "${{ steps.check.outputs.release_notes_path }}"
